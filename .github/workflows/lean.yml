name: Lean verification

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify repository SHA-256 manifest
        run: python tools/verify_sha256.py

      - name: Build pinned Lean project
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
          build: true
          test: false
          lint: false
          use-mathlib-cache: true

      - name: Enforce proof-bypass-free OBS sources
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE --include='*.lean' '\b(sorry|admit|axiom|unsafe|native_decide|sorryAx)\b' lean/OBS; then
            echo "Forbidden proof-bypass token found."
            exit 1
          fi
          echo "PASS: no forbidden proof-bypass token found in lean/OBS"
